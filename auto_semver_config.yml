start_version: "0.1.0"

suffixes:
  dev: "-dev"
  staging: "-rc"
  main: ""  # Production releases

promotions:
  - from_branch: dev
    to_branch: staging
  - from_branch: staging
    to_branch: master

branch_strategy: "single"  # "single" or "multi"

files_to_update:
  - "version.txt"
  - "pyproject.toml"

pull_request:
  title: "Release {{version}}"
  labels:
    - "semver-bump"
  body: |
    ## Release Notes
    - Version: {{version}}
    - Date: {{date}}
    - Changes:
      {% for msg in messages %}
      - {{ msg }}
      {% endfor %}

changelog:
  file: "CHANGELOG.md"
  truncate: true
  template: |
    ## [{{version}}] - {{date}}
    {% for msg in messages %}
    - {{ msg }}
    {% endfor %}

  # Optional: Specify a custom changelog header
  header: |
    # Changelog
    All notable changes to this project will be documented in this file.

  # Optional: Specify a custom changelog footer
  footer: |
    ## License
    This project is licensed under the MIT License.