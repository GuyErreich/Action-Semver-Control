version: '3'


tasks:
  install:
    desc: Install dev dependencies 
    cmds:
      - python3 -m venv .venv
      - .venv/bin/pip install -U pip
      - .venv/bin/pip install -r requirements.txt -r requirements-dev.txt -e .
  sources:
    - requirements.txt
    - requirements-dev.txt
  generates:
    - .venv

  format:
    desc: Format code with black
    cmds:
      - .venv/bin/black .

  lint:
    desc: Lint code with ruff
    cmds:
      - .venv/bin/ruff check . --fix

  type-check:
    desc: Run mypy type checks
    cmds:
      - .venv/bin/mypy src tests

  test:
    desc: Run pytest
    cmds:
      - echo "Running tests..."
      - .venv/bin/pytest -s

  all:
    desc: Run all checks
    deps: [format, lint, type-check, test]

  pre-commit:
    desc: Run pre-commit hooks
    cmds:
      - pre-commit install
