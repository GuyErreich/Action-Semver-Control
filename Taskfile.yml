version: '3'


tasks:
  init:
    desc: Initialize project with Python version
    cmds:
      - uv python pin 3.12
    generates:
      - .python-version

  install:
    desc: Install dependencies with uv
    cmds:
      - uv sync --dev
    sources:
      - pyproject.toml
      - uv.lock

  format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format .

  lint:
    desc: Lint code with ruff
    cmds:
      - uv run ruff check .
    

  type-check:
    desc: Run mypy type checks
    cmds:
      - uv run mypy src tests

  test:
    desc: Run pytest
    cmds:
      - echo "Running tests..."
      - uv run pytest -s -v

  all:
    desc: Run all checks
    deps: [format, lint, type-check, test]

  pre-commit:
    desc: Run pre-commit hooks
    cmds:
      - pre-commit install
