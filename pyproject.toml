[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 110
target-version = "py312"
include = ["*.py"]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle (PEP8)
  "F",    # pyflakes
  "N",    # pep8-naming
  "D",    # pydocstyle
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # bugbear
  "RUF",  # ruff-specific rules
  "PL",   # pylint
]
ignore = [
  "D202",  # No blank lines after function docstring
  "D211",  # 1 blank line required before class docstring
  "D212",  # Multi-line docstring summary should start at the first line
  "PLR0913",  # Too many arguments
]


[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
ignore_missing_imports = true
strict = true
install_types = true
plugins = []

