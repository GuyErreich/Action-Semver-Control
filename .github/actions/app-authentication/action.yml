name: 'App Authentication'
description: 'Authenticate as a GitHub App and get user info'
inputs:
  app-id:
    description: 'The GitHub App ID'
    required: true
  private-key:
    description: 'The GitHub App Private Key'
    required: true
  installation-id:
    description: 'The GitHub App Installation ID'
    required: false
outputs:
  token:
    description: "The installation access token"
    value: ${{ steps.app-token.outputs.token }}
  user-name:
    description: "The GitHub App User Name (slug[bot])"
    value: ${{ steps.get-user-info.outputs.user-name }}
  user-email:
    description: "The GitHub App User Email (id+slug[bot]@users.noreply.github.com)"
    value: ${{ steps.get-user-info.outputs.user-email }}

runs:
  using: "composite"
  steps:
    - uses: actions/create-github-app-token@v2
      id: app-token
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        installation-id: ${{ inputs.installation-id }}
    - name: Get GitHub App User Info
      id: get-user-info
      shell: bash
      run: |
        USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
        echo "user-name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
        echo "user-email=${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        APP_SLUG: ${{ steps.app-token.outputs.app-slug }}