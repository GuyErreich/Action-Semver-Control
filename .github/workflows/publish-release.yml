name: Publish Release

on:
  push:
    tags:
      - '*.*.*'
      - '*.*.*-rc'
      - '!*.*.*-dev'
  workflow_dispatch: #for testing


jobs:
  production-release:
    if: "!contains(github.ref, '-rc')"
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Dynamically set environment based on branch
    environment: 'production'

    steps:
      - name: GH Release
        uses: ./.github/actions/gh-release

  staging-release:
    if: "contains(github.ref, '-rc')"
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Dynamically set environment based on branch
    environment: 'staging'

    steps:
      - name: GH Release
        uses: ./.github/actions/gh-release