name: Auto Semver Bump

on:
  pull_request:
    types:
      - closed  # Means merged or declined
    branches:
      - master
      - dev

permissions:
  contents: write   # Allow push, create branches, modify files
  pull-requests: write  # Allow create/close PRs


jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Important! Needed for git history
        persist-credentials: false

    - name: Get GitHub App Token
      uses: ./.github/actions/app-authentication
      id: app-token
      with:
        app-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        installation-id: ${{ secrets.GH_APP_INSTALLATION_ID }}

    - name: Configure Git for App
      run: |
        git config user.name "${{ steps.app-token.outputs.user-name }}"
        git config user.email "${{ steps.app-token.outputs.user-email }}"
        git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git

    - name: Run Auto Semver Action
      uses: ./  # Local Docker action
      with:
        # target-branch: ${{ github.ref_name }}
        github-token: ${{ steps.app-token.outputs.token }}
        # repo-full-name: ${{ github.repository }}
        debug: true
