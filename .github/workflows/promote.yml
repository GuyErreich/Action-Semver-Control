name: Manual Promotion

on:
  workflow_dispatch:
    inputs:
      from_tag:
        description: 'Specific tag to promote (e.g. v1.0.0-beta.1)'
        required: true
        type: string
      to_branch:
        description: 'Target branch to promote to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - master
      dry_run:
        description: 'Validate promotion without performing changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for git operations

    - name: Get GitHub App Token
      uses: ./.github/actions/app-authentication
      id: app-token
      with:
        app-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

    - name: Configure Git for App
      run: |
        git config user.name "${{ steps.app-token.outputs.user-name }}"
        git config user.email "${{ steps.app-token.outputs.user-email }}"
        git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git

    - name: List recent tags
      run: |
        echo "📋 Recent tags (for reference):"
        git tag -l | sort -V | tail -n 10

    - name: Validate promotion (dry run)
      if: ${{ inputs.dry_run }}
      uses: ./
      with:
        action: promote
        to_branch: ${{ inputs.to_branch }}
        from_tag: ${{ inputs.from_tag }}
        dry_run: true
        github-token: ${{ steps.app-token.outputs.token }}
        debug: true

    - name: Execute Promotion
      if: ${{ !inputs.dry_run }}
      uses: ./
      with:
        action: promote
        to_branch: ${{ inputs.to_branch }}
        from_tag: ${{ inputs.from_tag }}
        github-token: ${{ steps.app-token.outputs.token }}
        debug: true

    - name: Summary
      if: always()
      run: |
        SOURCE="${{ inputs.from_tag }}"
        if [[ -z "$SOURCE" ]]; then
          SOURCE="latest from ${{ inputs.from_branch }}"
        fi
        
        if [[ "${{ job.status }}" == "success" ]]; then
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "### 🧪 Dry Run Completed" >> $GITHUB_STEP_SUMMARY
            echo "Promotion validation: **$SOURCE** → **${{ inputs.to_branch }}**" >> $GITHUB_STEP_SUMMARY
            echo "Status: ✅ Configuration valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 🚀 Promotion Completed" >> $GITHUB_STEP_SUMMARY
            echo "Promotion: **$SOURCE** → **${{ inputs.to_branch }}**" >> $GITHUB_STEP_SUMMARY
            echo "✅ The version has been promoted and tagged on the target branch." >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "### ❌ Promotion Failed" >> $GITHUB_STEP_SUMMARY
          echo "Promotion: **$SOURCE** → **${{ inputs.to_branch }}**" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs for details." >> $GITHUB_STEP_SUMMARY
        fi
