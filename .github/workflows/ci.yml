name: CI

on:
  pull_request:
    branches:
      - staging
      - dev



jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache virtual environment
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-venv-${{ matrix.python-version }}-

    - name: Cache tool caches (mypy, ruff, pytest)
      uses: actions/cache@v4
      with:
        path: |
          .mypy_cache
          .ruff_cache
          .pytest_cache
        key: ${{ runner.os }}-tool-caches-${{ matrix.python-version }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-tool-caches-${{ matrix.python-version }}-

    - name: Cache Task binary
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/task
        key: ${{ runner.os }}-task-${{ hashFiles('install-task.sh') }}

    - name: Install go tasks
      run: ./install-task.sh

    - name: Install dependencies
      run: task install

    - name: Lint code
      run: task lint

    - name: Type check
      run: task type-check

    - name: Run tests
      run: task test